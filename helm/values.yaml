# Default values for mle-frontend (React SPA served by nginx)
# This is a YAML-formatted file; override as needed per environment

replicaCount: 2

image:
  repository: ghcr.io/runtime-software-development/mle-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ghcr-pull-secret
nameOverride: ""
fullnameOverride: ""

nginxConfig: |
  server {
      listen 8080;
      server_name localhost;

      location / {
          root /usr/share/nginx/html;
          index index.html index.htm;
          try_files $uri $uri/ /index.html;
      }

      location /api/ {
          rewrite ^/api/(.*) /$1 break;
          proxy_pass http://mle-backend-mle-api-api-svc:3000;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
      }

      # Keycloak Authentication Proxy
      location /auth/ {
        # 1. Define the internal K8s DNS resolver (Kube-DNS standard IP)
        resolver 10.96.0.10 valid=30s;
        
        # 2. Assign the service destination to a variable
        set $keycloak_upstream http://mle-backend-mle-api-keycloak:8081;
        
        # 3. Proxy pass to the variable instead of a raw string
        proxy_pass $keycloak_upstream/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
  }

serviceAccount:
  create: true
  automount: true
  name: ""

podAnnotations: {}
podLabels: {}

# To satisfy 'restricted' PSA
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  runAsNonRoot: true  # Required by your error log
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:     # Required by your error log
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "traefik"
  annotations: {} # No middlewares needed!
  hosts:
    - host: mlp-explorer-test.kestrel.arbutus.cloud
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: mle-frontend # All traffic goes here
              port:
                number: 80

resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80  # optional

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10

# Rolling update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Node selector / affinity / tolerations (optional)
nodeSelector: {}
tolerations: []
affinity: {}
