# Default values for mle-frontend (React SPA served by nginx)
# This is a YAML-formatted file; override as needed per environment

replicaCount: 2

image:
  repository: ghcr.io/runtime-software-development/mle-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  name: ""

podAnnotations: {}
podLabels: {}

# To satisfy 'restricted' PSA
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  runAsNonRoot: true  # Required by your error log
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:     # Required by your error log
    type: RuntimeDefault

service:
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: mle-frontend.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: mle-frontend-tls
  #    hosts:
  #      - mle-frontend.example.com

resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80  # optional

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10

# Rolling update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Node selector / affinity / tolerations (optional)
nodeSelector: {}
tolerations: []
affinity: {}
