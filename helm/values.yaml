# Default values for mle-frontend (React SPA served by nginx)
# This is a YAML-formatted file; override as needed per environment

replicaCount: 2

image:
  repository: ghcr.io/runtime-software-development/mle-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  name: ""

podAnnotations: {}
podLabels: {}
# Leave empty to use container default (nginx:alpine runs as root).
# For non-root, use an image like nginxinc/nginx-unprivileged and set runAsUser.
podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  # Set to false if nginx fails (needs write to /var/cache/nginx, /var/run)
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: mle-frontend.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: mle-frontend-tls
  #    hosts:
  #      - mle-frontend.example.com

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80  # optional

# Liveness probe
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

# Rolling update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Node selector / affinity / tolerations (optional)
nodeSelector: {}
tolerations: []
affinity: {}
