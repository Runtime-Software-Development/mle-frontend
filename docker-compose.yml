services:
  mle-frontend:
    image: mle-frontend
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules